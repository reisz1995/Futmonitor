name: Scraper Brasileirão Série A - Cloudflare Bypass

on:
  schedule:
    # Executar diariamente às 6h da manhã (UTC-3 = 9h UTC)
    - cron: '0 9 * * *'

  # Permitir execução manual
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependências Python
      run: |
        pip install -r requirements.txt

    - name: Instalar browsers do Playwright
      run: |
        playwright install chromium

    - name: Executar scraper v2 (SeleniumBase/Playwright)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python scraper_brasileirao_v2.py

    - name: Upload backup JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: brasileirao-backup
        path: brasileirao_backup_*.json
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload debug HTML (se falhar)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-html
        path: debug_page.html
        retention-days: 5
        if-no-files-found: ignore
        
